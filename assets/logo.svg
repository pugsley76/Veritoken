<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF"/>
      <stop offset="100%" style="stop-color:#00C9A7"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF"/>
      <stop offset="100%" style="stop-color:#00C9A7"/>
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <path d="M32 8 L52 16 L52 36 Q52 52 32 60 Q12 52 12 36 L12 16 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Checkmark inside shield -->
  <polyline points="22,34 29,42 42,26"
            fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hexagon ring (token symbol) -->
  <polygon points="32,12 46,20 46,36 32,44 18,36 18,20"
           fill="none" stroke="url(#tokenGrad)" stroke-width="1"
           stroke-opacity="0.25" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="66" y="46"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.5"
        fill="url(#tokenGrad)">Veritoken</text>

  <!-- Tagline -->
  <text x="67" y="62"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10"
        font-weight="400"
        letter-spacing="2.5"
        fill="#888">RWA · STELLAR · SOROBAN</text>
</svg>
